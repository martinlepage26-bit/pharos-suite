<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">PHAROS Deterministic AI Governance</title>
  <desc id="desc">PHAROS helps teams answer procurement, audit, and executive review pressure with deterministic governance.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f8ff" />
      <stop offset="55%" stop-color="#eef4ff" />
      <stop offset="100%" stop-color="#e4edff" />
    </linearGradient>
    <radialGradient id="haloA" cx="86%" cy="12%" r="52%">
      <stop offset="0%" stop-color="#1b4dff" stop-opacity="0.22" />
      <stop offset="68%" stop-color="#1b4dff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="haloB" cx="10%" cy="18%" r="48%">
      <stop offset="0%" stop-color="#0eb9a5" stop-opacity="0.16" />
      <stop offset="72%" stop-color="#0eb9a5" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f6bff" />
      <stop offset="100%" stop-color="#1144d3" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#haloA)" />
  <rect width="1200" height="630" fill="url(#haloB)" />

  <g transform="translate(96 88)">
    <rect x="0" y="0" width="1008" height="454" rx="36" fill="#ffffff" fill-opacity="0.82" stroke="#bfd0f2" stroke-width="2" />

    <g transform="translate(56 58)">
      <rect x="0" y="0" width="66" height="66" rx="33" fill="url(#brand)" />
      <text x="92" y="25" font-size="24" font-family="'IBM Plex Mono', ui-monospace, monospace" font-weight="700" letter-spacing="5" fill="#1b2d55">PHAROS</text>
      <text x="92" y="53" font-size="17" font-family="'Manrope', 'Segoe UI', sans-serif" font-weight="600" fill="#3f5d8a">Deterministic AI Governance</text>

      <text x="0" y="130" font-size="68" font-family="'Sora', 'Avenir Next', sans-serif" font-weight="700" letter-spacing="-2" fill="#0b1730">Governance buyers can verify.</text>
      <text x="0" y="180" font-size="30" font-family="'Manrope', 'Segoe UI', sans-serif" fill="#2f4c79">Procurement, audit, and executive review under one</text>
      <text x="0" y="220" font-size="30" font-family="'Manrope', 'Segoe UI', sans-serif" fill="#2f4c79">deterministic decision and evidence structure.</text>

      <g transform="translate(0 274)">
        <rect x="0" y="0" width="270" height="44" rx="22" fill="#1b4dff" />
        <text x="22" y="28" font-size="16" font-family="'IBM Plex Mono', ui-monospace, monospace" letter-spacing="1.3" font-weight="700" fill="#f7faff">BOOK A REVIEW</text>
      </g>

      <g transform="translate(0 350)">
        <rect x="0" y="0" width="286" height="84" rx="18" fill="#f8fbff" stroke="#d3def2" />
        <text x="20" y="31" font-size="13" font-family="'IBM Plex Mono', ui-monospace, monospace" font-weight="600" letter-spacing="1.2" fill="#2450cf">OUTPUT</text>
        <text x="20" y="61" font-size="22" font-family="'Sora', 'Avenir Next', sans-serif" font-weight="700" fill="#0b1730">Threshold + Decision + Evidence</text>
      </g>
    </g>
  </g>
</svg>
