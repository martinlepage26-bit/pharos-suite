name = "pharos-compass-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[env.production]
name = "compass-pharos"

[[d1_databases]]
binding = "AURORA_DB"
database_name = "pharos-governance"
database_id = "REPLACE_WITH_ACTUAL_ID"

[[r2_buckets]]
binding = "AURORA_FILES"
bucket_name = "pharos-files"
